name: CI

# Builds and tests on macOS, Linux and Windows, and — on a tag like
# "xrnsdaw-v1.0" — publishes a prebuilt binary for each OS to a GitHub Release.
# SwiftPM is the build system, so the commands are identical per OS.

on:
  push:
    branches: [ main ]
    tags: [ 'xrnsdaw-v*' ]
  pull_request:
    branches: [ main ]

jobs:
  build-test:
    name: Build & test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    # Windows is non-blocking: Swift's C-interop on Windows currently hits a
    # toolchain bug (cyclic 'ucrt' module via VS/SDK intrinsics) that breaks
    # importing any C module. The source is portable; releases are macOS + Linux
    # until the toolchain is fixed, so a red Windows build mustn't fail the run.
    continue-on-error: ${{ matrix.os == 'windows-2022' }}
    strategy:
      fail-fast: false
      matrix:
        # Per-OS Swift pin. macOS/Linux use 6.0. Windows uses 5.10 + windows-2022:
        # Swift 6.0.x on Windows has a C-interop toolchain bug ("cyclic dependency
        # in module 'ucrt' -> _Builtin_intrinsics -> ucrt") that breaks importing
        # any C module, and windows-latest's VS2025 SDK compounds it.
        include:
          - os: macos-latest
            swift: "6.0"
          - os: ubuntu-latest
            swift: "6.0"
          - os: windows-2022
            swift: "5.10"
    steps:
      - uses: actions/checkout@v4
      - uses: SwiftyLab/setup-swift@latest
        with:
          swift-version: ${{ matrix.swift }}
      - name: Build (release)
        run: swift build -c release
      - name: Test
        run: swift test

  release:
    name: Release (${{ matrix.os }})
    needs: build-test
    if: startsWith(github.ref, 'refs/tags/xrnsdaw-v')
    permissions:
      contents: write
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            asset: xrnsdaw-macos-arm64
            static: ""
            swift: "6.0"
          - os: ubuntu-latest
            asset: xrnsdaw-linux-x86_64
            static: "--static-swift-stdlib"
            swift: "6.0"
          # Windows omitted from releases until the Swift C-interop toolchain bug
          # (cyclic 'ucrt' module) is resolved; macOS + Linux ship as v1.0.
    steps:
      - uses: actions/checkout@v4
      - uses: SwiftyLab/setup-swift@latest
        with:
          swift-version: ${{ matrix.swift }}
      - name: Build (release)
        run: swift build -c release ${{ matrix.static }}
      - name: Stage binary (Unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p dist
          cp .build/release/xrnsdaw "dist/${{ matrix.asset }}"
      - name: Stage binary (Windows)
        if: runner.os == 'Windows'
        run: |
          mkdir dist
          copy .build\release\xrnsdaw.exe dist\${{ matrix.asset }}.exe
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: dist/*
      - name: Attach to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
